apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ops
  labels:
    app: order-service
data:
  NODE_ENV: production
  SERVICE_NAME: order-service
  PORT: "4003"
  LOG_LEVEL: info
  # Service DNS within the namespace.
  PRODUCT_SERVICE_URL: http://product-service.ops.svc.cluster.local:4002
  PRODUCT_SERVICE_TIMEOUT_MS: "3000"
  IDEMPOTENCY_TTL_SECONDS: "86400"
  CORS_ALLOWLIST: ""
