# order-service Deployment.
#
# Rollout strategy: RollingUpdate, maxSurge=1, maxUnavailable=0.
#   Why maxUnavailable=0: we'd rather use a bit of extra capacity during deploy than risk
#   reduced availability while pods restart.
#
# Probes:
#   - livenessProbe → /health/live. If this fails repeatedly, k8s restarts the pod.
#   - readinessProbe → /health/ready. Failures remove the pod from the Service endpoint list,
#     so traffic is paused until dependencies (Mongo/Redis/RabbitMQ) come back.
#
# preStop hook gives a grace period before SIGTERM, so the Service has time to remove this pod
# from its endpoint list (k8s endpoint propagation is not instantaneous).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ops
  labels:
    app: order-service
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        # Why a Prometheus scrape annotation: ServiceMonitor would be the cleaner play with
        # Prometheus Operator, but this annotation is the lowest-common-denominator approach
        # that works with both raw kube-prometheus and ServiceMonitors.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "4003"
    spec:
      # Security context: non-root, read-only root fs (where possible), no privilege escalation.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: order-service
          image: ghcr.io/your-org/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4003
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: PORT }
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: NODE_ENV }
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: SERVICE_NAME }
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: LOG_LEVEL }
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: PRODUCT_SERVICE_URL }
            - name: PRODUCT_SERVICE_TIMEOUT_MS
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: PRODUCT_SERVICE_TIMEOUT_MS }
            - name: IDEMPOTENCY_TTL_SECONDS
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: IDEMPOTENCY_TTL_SECONDS }
            - name: CORS_ALLOWLIST
              valueFrom:
                configMapKeyRef: { name: order-service-config, key: CORS_ALLOWLIST }
            - name: MONGO_URI
              valueFrom:
                secretKeyRef: { name: order-service-secret, key: MONGO_URI }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: order-service-secret, key: REDIS_URL }
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef: { name: order-service-secret, key: RABBITMQ_URL }
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef: { name: order-service-secret, key: JWT_ACCESS_SECRET }
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          lifecycle:
            preStop:
              # Sleep so endpoint propagation completes before SIGTERM. Service stops sending us
              # new requests; in-flight ones finish; then graceful shutdown closes Mongo/Redis/AMQP.
              exec:
                command: ["sh", "-c", "sleep 5"]
