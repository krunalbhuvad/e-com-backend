# NEVER commit real values. These are base64-encoded placeholders so the manifest is loadable
# for the interview demo. In production:
#   1. Generate via a secret manager (Vault, AWS Secrets Manager, GCP Secret Manager).
#   2. Pull into k8s via External Secrets Operator or CSI driver.
#   3. Rotate on a cadence (90 days is typical for JWT secret pre-RS256).
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: ops
  labels:
    app: order-service
type: Opaque
stringData:
  MONGO_URI: "mongodb://mongo.ops.svc.cluster.local:27017/order_db"
  REDIS_URL: "redis://redis.ops.svc.cluster.local:6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.ops.svc.cluster.local:5672"
  JWT_ACCESS_SECRET: "REPLACE-ME-WITH-AT-LEAST-32-CHAR-SECRET-XXX"
