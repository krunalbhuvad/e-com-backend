version: "3.9"

x-node-base: &node-base
  restart: unless-stopped
  networks:
    - ops-net

networks:
  ops-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  rabbitmq-data:

services:
  mongo:
    image: mongo:7
    container_name: ops-mongo
    networks: [ops-net]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["mongod", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ops-redis
    networks: [ops-net]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ops-rabbitmq
    networks: [ops-net]
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    <<: *node-base
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: ops-auth
    env_file: ./services/auth-service/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/auth_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:4001"

  product-service:
    <<: *node-base
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: ops-product
    env_file: ./services/product-service/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/product_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4002:4002"

  order-service:
    <<: *node-base
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: ops-order
    env_file: ./services/order-service/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/order_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:4002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
    ports:
      - "4003:4003"

  notification-service:
    <<: *node-base
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: ops-notification
    env_file: ./services/notification-service/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/notification_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4004:4004"

  api-gateway:
    <<: *node-base
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: ops-gateway
    env_file: ./services/api-gateway/.env.example
    environment:
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:4001
      PRODUCT_SERVICE_URL: http://product-service:4002
      ORDER_SERVICE_URL: http://order-service:4003
      NOTIFICATION_SERVICE_URL: http://notification-service:4004
    depends_on:
      - auth-service
      - product-service
      - order-service
      - notification-service
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: ops-nginx
    networks: [ops-net]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
