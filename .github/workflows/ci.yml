name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Why per-service matrix instead of one giant job:
#   - Each service runs in parallel — wall-clock time is one service, not five.
#   - Failure isolation: a flaky test in product-service doesn't block auth-service deploys.
#   - GHCR push only happens on main, after all services pass.

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - product-service
          - order-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Why we install shared first: every service references it via file:../../shared.
      - name: Install shared
        working-directory: shared
        run: npm install --no-audit --no-fund

      - name: Install service deps
        working-directory: services/${{ matrix.service }}
        run: npm install --no-audit --no-fund

      - name: Lint (best-effort; failures non-blocking until eslint config is added)
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present || true

  build-and-push:
    name: build + push (${{ matrix.service }})
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - product-service
          - order-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
